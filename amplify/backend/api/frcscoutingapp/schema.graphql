# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

###############
### ENUMS   ###
###############

enum MatchType {
  Practice
  Qual
  Elim
}

enum AllianceColor {
  Red
  Blue
}

enum AutoHangOpts {
  None
  Level1
  Level2
  Level3
}

enum EndgameOpts {
  Level3
  Level2
  Level1
  None
}

enum SpeedOpts {
  None
  Slow
  Average
  Fast
}

###############
### SCORING ###
###############

type TeleScoring {
  Fuel: Int
  Cycles: Int
}

type TelePointsScoring {
  Points: Int
  EndgamePoints: Int
}

type AutoScoring {
  Fuel: Int
}

enum AutoHangOpts {
  Level1
  None
}

type AutonomousType {
  AmountScored: AutoScoring
  PointsScored: AutoPointsScoring
  Left: Boolean
  Hang: AutoHangOpts
}

type PenaltyOpts {
  YellowCard: Boolean
  RedCard: Boolean
  Disabled: Boolean
  DQ: Boolean
  Broken: Boolean
  NoShow: Boolean
}

type TeleType {
  TeleStrat: TeleStratOpts
  TravelMid: Int
  Endgame: HangOpts
}

type PenaltyType {
  Fouls: Int
  Tech: Int
  PenaltiesCommitted: PenaltyOpts
  FoulDesc: String
}

type RobotInfoType {
  RobotSpeed: SpeedOpts
  ShooterSpeed: SpeedOpts
  FuelCapacity: Int
  BallsShot: Int
  ShootingCycles: Int
  WhatBrokeDesc: String
  Comments: String
}

#################
### TEAM INFO ###
#################

# enums

enum ActiveStratOpts {
  Hoarding
  Defense
  Offensive
  Support
}

enum InactiveStratOpts {
  Hoarding
  Defense
  Offensive
  Support
}

enum HangTeamworkOpts {
  DoubleHang
  TripleHang
}

enum CapabilitiesOpts {
  Bump
  Trench
}

type Team
  @model
  @auth(rules: [{ allow: private, provider: iam }])
{
  id: ID! @primaryKey
  description: String
  Comment: String
  photo: String
  fuelCapacity: Int

  # --- Notes form fields (src/scoutingNotes/Notes.jsx) ---
  hangTime: Float
  cyclesPerMatch: Int
  fuelPerCycle: Int
  bump: Boolean
  trench: Boolean
  numAutos: Int
  maxHangHeight: String
  canDoubleHang: Boolean
  canTripleHang: Boolean

  # Team-centric relationship: all matches for this team (sorted by Regional/MatchType/MatchNumber via TeamMatch @index)
  matches: [TeamMatch] @hasMany(indexName: "byTeam", fields: ["id"])
}

##################
### TEAM MATCH  ###
##################

type TeamMatch
  @model
  @auth(rules: [{ allow: private, provider: iam }])
{
  id: ID! @primaryKey

  # Team-centric foreign key (partition for the byTeam index)
  Team: ID!
    @index(
      name: "byTeam"
      sortKeyFields: ["Regional", "MatchType", "MatchNumber"]
    )

  # Regional-centric index for event-wide graphs/tables
  Regional: String!
    @index(
      name: "byRegional"
      sortKeyFields: ["MatchType", "MatchNumber", "Team"]
    )

  MatchType: MatchType!
  MatchNumber: Int!
  MatchKey: String
  Alliance: AllianceColor

  TotalPoints: Int

  Autonomous: AutonomousType!
  Teleop: TeleopType!
  RobotInfo: RobotInfoType!
  Penalties: PenaltyType
}