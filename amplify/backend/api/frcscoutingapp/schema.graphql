# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

##################
### AUTONOMOUS ###
##################

# enums
enum AutoStratOpts {
  LeftStartingZone
  ScoredInGoal
  Nothing
}

enum AutoHangOpts {
  Level1
  None
}

# types
type AutonomousType {
  AutoStrat: [AutoStratOpts]
  AutoHang: AutoHangOpts
}

##############
### TELEOP ###
##############

#enums

enum HangOpts {
  Level3
  Level2
  Level1
  None
}

# types

type PenaltyOpts {
  Disabled: Boolean
  DQ: Boolean
  Broken: Boolean
  NoShow: Boolean
  StuckOnBump: Boolean
  StuckOnBalls: Boolean
}

type TeleType {
  TravelMid: Int
  Endgame: HangOpts
}

type PenaltyType {
  PenaltiesCommitted: PenaltyOpts
  FoulDesc: String
}

##################
### ROBOT INFO ###
##################

# enums
enum SpeedOpts {
  None
  Slow
  Average
  Fast
}

enum DriverSkillOpts {
  Poor
  Average
  Good
  Excellent
}

# types

type RobotInfoType {
  RobotSpeed: SpeedOpts
  ShooterSpeed: SpeedOpts
  DriverSkill: DriverSkillOpts
  FuelCapacity: Int
  BallsShot: Int
  ShootingCycles: Int
  WhatBrokeDesc: String
  Comments: String
}

#################
### TEAM INFO ###
#################

# enums

enum StratOpts {
  Hoarding
  Defense
  Aggressive
  Support
  Shooting
  None
}

enum MatchResultOpts {
  Win
  Lose
  Tie
}

enum TeamImpactOpts {
  High
  Medium
  Low
}

enum MatchTypeOpts {
  q
  sf
  f
  p
}

enum HangTeamworkOpts {
  DoubleHang
  TripleHang
  None
}

enum CapabilitiesOpts {
  Bump
  Trench
  None
}

# types

type TeamMatchesType {
  name: String
  description: String
  Team: ID!
  MatchId: String
  MatchType: MatchTypeOpts
  MatchResult: MatchResultOpts
  AutoWin: MatchResultOpts
  TeamImpact: TeamImpactOpts
  AutoImpact: TeamImpactOpts
  AllianceScore: Int
  OpponentScore: Int
  SubmittedBy: String
  Autonomous: AutonomousType!
  Teleop: TeleType!
  ActiveStrat: [StratOpts]
  InactiveStrat: [StratOpts]
  RobotInfo: RobotInfoType
  Penalties: PenaltyType
}

type TeamAttributesType {
  name: String
  Regional: String!
  DeclaredFuelCap: Int
  CyclesPerMatch: Int
  FuelPerCycle: Int
  NumAutos: Int
  Capabilities: [CapabilitiesOpts]
  MaxHang: HangOpts
  HangTeamwork: HangTeamworkOpts
  HangTime: Float
  CanAutoHang: Boolean
  Photo: String
  Notes: String
}

type RegionalType {
  RegionalId: String
  TeamMatches: [TeamMatchesType]
}

type Team @model @auth(rules : [{ allow: private, provider: iam}]) {
  id: ID! @primaryKey
  description: String
  Comment: String
  TeamAttributes: TeamAttributesType!
  Regionals: [RegionalType]
}