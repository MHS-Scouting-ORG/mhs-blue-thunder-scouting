# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

###############
### SCORING ###
###############

# enums

# types
type TeleScoring {
  Fuel: Int
  Cycles: Int
}

type TelePointsScoring {
  Points: Int
  EndgamePoints: Int
}

##################
### AUTONOMOUS ###
##################

# enums
type AutoScoring {
  Fuel: Int
}

type AutoPointsScoring {
  Points: Int
}

# types
type AutonomousType {
  AmountScored: AutoScoring
  PointsScored: AutoPointsScoring
  Left: Boolean
  Hang: String
}

##############
### TELEOP ###
##############

# enums

enum EndgameOpts {
  Level3
  Level2
  Level1
  None
}

# types

type PenaltyOpts {
  YellowCard: Boolean
  RedCard: Boolean
  Disabled: Boolean
  DQ: Boolean
  Broken: Boolean
  NoShow: Boolean
}

type HumPlrScoringType {
  Made: Int
  Missed: Int
}

type EndgameType {
  EndGameResult: EndgameOpts
}

type TeleopType {
  AmountScored: TeleScoring
  PointsScored: TelePointsScoring
  Endgame: EndgameType
  HumPlrScoring: HumPlrScoringType
}

type PenaltyType {
  Fouls: Int
  Tech: Int
  PenaltiesCommitted: PenaltyOpts
  FoulDesc: String
}

##################
### ROBOT INFO ###
##################

# enums
enum SpeedOpts {
  None
  Slow
  Average
  Fast
}

# types

type RobotInfoType {
  RobotSpeed: SpeedOpts
  ShootingSpeed: SpeedOpts
  WhatBrokeDesc: String
  Comments: String
}

#################
### TEAM INFO ###
#################

# types

type Team @model @auth(rules : [{ allow: private, provider: iam}]) {
  id: ID! @primaryKey
  name: String!
  description: String
  Comment: String
  photo: String
  fuelCapacity: Int
}

type TeamMatch @model @auth(rules : [{ allow: private, provider: iam}]) {
  id: ID! @primaryKey(sortKeyFields: ["Regional","Team"])
  name: String
  description: String
  Team: ID! @index
  Regional: String! @index
  TotalPoints: Int
  Autonomous: AutonomousType!
  Teleop: TeleopType!
  RobotInfo: RobotInfoType!
  Penalties: PenaltyType
}