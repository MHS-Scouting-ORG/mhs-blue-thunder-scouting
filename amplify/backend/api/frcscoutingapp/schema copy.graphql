# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules
input AMPLIFY { globalAuthRule: AuthRule = { allow: public } } # FOR TESTING ONLY!

##################
### AUTONOMOUS ###
##################

# enums
enum AutoStratOpts {
  WentMid
  Scored
  CrossedMid
  None
}

enum AutoHangOpts {
  Level1
  None
}

# types
type AutonomousType {
  AutoStrat: AutoStratOpts
  TravelMid: Int
  AutoHang: AutoHangOpts
}

##############
### TELEOP ###
##############

#enums

enum HangOpts {
  Level3
  Level2
  Level1
}

# types

enum TeleStratOpts {
  Basic
}

type PenaltyOpts {
  YellowCard: Boolean
  RedCard: Boolean
  Disabled: Boolean
  DQ: Boolean
  Broken: Boolean
  NoShow: Boolean
}

type TeleType {
  TeleStrat: TeleStratOpts
  TravelMid: Int
  Endgame: HangOpts
}

type PenaltyType {
  Fouls: Int
  Tech: Int
  PenaltiesCommitted: PenaltyOpts
  FoulDesc: String
}

##################
### ROBOT INFO ###
##################

# enums
enum SpeedOpts {
  None
  Slow
  Average
  Fast
}

# types

type RobotInfoType {
  RobotSpeed: SpeedOpts
  ShooterSpeed: SpeedOpts
  FuelCapacity: Int
  BallsShot: Int
  ShootingCycles: Int
  WhatBrokeDesc: String
  Comments: String
}

#################
### TEAM INFO ###
#################

# enums

enum StratOpts {
  Hoarding
  Defense
  Offensive
  Support
}

enum InactiveStratOpts {
  Hoarding
  Defense
  Offensive
  Support
}

enum HangTeamworkOpts {
  DoubleHang
  TripleHang
}

enum CapabilitiesOpts {
  Bump
  Trench
}

# types

type TeamMatchesType {
  name: String
  description: String
  Team: ID!
  Regional: String!
  Autonomous: AutonomousType!
  Teleop: TeleType!
  ActiveStrat: [StratOpts]
  InactiveStrat: [StratOpts]
  Penalties: PenaltyType
}

type TeamAttributesType {
  name: String
  Regional: String!
  DeclaredFuelCap: Int
  CyclesPerMatch: Int
  Capabilities: CapabilitiesOpts
  MaxHang: HangOpts
  HangTeamwork: HangTeamworkOpts
  HangTime: Float
  Photo: String
  Notes: String
}

type Team @model @auth(rules : [{ allow: private, provider: iam}]) {
  id: ID! @primaryKey
  description: String
  Comment: String
  TeamMatches: TeamMatchesType!
  TeamAttributes: TeamAttributesType!
}